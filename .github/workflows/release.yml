name: Build & Release Principal Simulator

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write  

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron app
        run: pnpm run dist

      # ---------------- CLEAN TGZ ----------------
      - name: Create clean TGZ release package
        shell: pwsh
        run: |
          $releaseDir = "release"
          $tgzPath = "dist\principal-simulator-win-x64.tgz"

          Remove-Item $releaseDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $releaseDir | Out-Null

          Copy-Item "dist\win-unpacked\*" $releaseDir -Recurse

          if (Test-Path "README.md") { Copy-Item README.md $releaseDir }
          if (Test-Path "LICENSE") { Copy-Item LICENSE $releaseDir }

          tar -czf $tgzPath -C $releaseDir .

      # ---------------- ZIP ----------------
      - name: Create ZIP release package
        shell: pwsh
        run: |
          Compress-Archive -Path "release\*" -DestinationPath "dist\principal-simulator-win-x64.zip" -Force

      # ---------------- SHA256 ----------------
      - name: Generate SHA256SUMS
        shell: pwsh
        run: |
          $files = Get-ChildItem dist -File
          $out = foreach ($f in $files) {
            $h = Get-FileHash $f.FullName -Algorithm SHA256
            "$($h.Hash)  $($f.Name)"
          }
          $out | Out-File dist\SHA256SUMS.txt -Encoding utf8

      # ---------------- GITHUB RELEASE ----------------
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.zip
            dist/*.tgz
            dist/SHA256SUMS.txt