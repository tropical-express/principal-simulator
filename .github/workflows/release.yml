name: Build & Release Principal Simulator

on:
  push:
    tags:
      - "v*.*.*"   # releases only when you push tags like v0.1.0

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # -----------------------------
      # NODE + PNPM SETUP
      # -----------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # -----------------------------
      # BUILD ELECTRON APP
      # -----------------------------
      - name: Build Electron app
        run: pnpm run dist

      # -----------------------------
      # CLEAN RELEASE PACKAGE (TGZ)
      # -----------------------------
      - name: Create clean TGZ release package
        shell: pwsh
        run: |
          $releaseDir = "release"
          $tgzPath = "dist\principal-simulator-win-x64.tgz"

          if (Test-Path $releaseDir) {
            Remove-Item $releaseDir -Recurse -Force
          }

          New-Item -ItemType Directory -Path $releaseDir | Out-Null

          # Only real runtime build
          Copy-Item -Path "dist\win-unpacked\*" -Destination $releaseDir -Recurse

          # Optional metadata
          if (Test-Path "README.md") { Copy-Item README.md $releaseDir }
          if (Test-Path "LICENSE") { Copy-Item LICENSE $releaseDir }

          tar -czf $tgzPath -C $releaseDir .

      # -----------------------------
      # ZIP CLEAN COPY (optional but useful)
      # -----------------------------
      - name: Create ZIP release package
        shell: pwsh
        run: |
          $zipPath = "dist\principal-simulator-win-x64.zip"
          Compress-Archive -Path "release\*" -DestinationPath $zipPath -Force

      # -----------------------------
      # SHA256 CHECKSUMS
      # -----------------------------
      - name: Generate SHA256SUMS
        shell: pwsh
        run: |
          $files = Get-ChildItem dist -File
          $out = @()

          foreach ($f in $files) {
            $hash = Get-FileHash $f.FullName -Algorithm SHA256
            $out += "$($hash.Hash)  $($f.Name)"
          }

          $out | Out-File -Encoding utf8 dist\SHA256SUMS.txt

      # -----------------------------
      # GITHUB RELEASE
      # -----------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.zip
            dist/*.tgz
            dist/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------
      # UPLOAD ARTIFACTS (backup)
      # -----------------------------
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: principal-simulator-release
          path: dist